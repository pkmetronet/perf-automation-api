# Server Configuration
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/perftesttool
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
# We set this to 'validate' or 'none' because we are using the custom SQL schema provided earlier. 
# Do not use 'update' in production as it might overwrite your custom constraints.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Enable Jackson to serialize/deserialize UUIDs properly
spring.jackson.serialization.write-dates-as-timestamps=false